# Detailed run profiles for course/09_runbooks/run_retail_agentic_sequence.py.
#
# Workshop participants normally do not need this file. Use config.yaml for the
# small set of settings that should be changed during a workshop.

gpu_memory_presets:
  standard: {}
  low:
    vllm_gpu_memory_utilization: 0.55
    vllm_max_model_len: 8192
    vllm_max_num_batched_tokens: 8192
    vllm_max_num_seqs: 4

prompt_presets:
  retail_agentic_state_action: &retail_agentic_state_action_prompt |
    Your goal is to resolve the customer's retail request by using the provided tools.
    Use read-only tools to authenticate the user, inspect order/product/profile state, and verify policy requirements before consequential actions.
    Do not merely describe an action that changes order, return, exchange, payment, or address state.
    When policy allows the action and the customer has provided the required information and confirmation, call the appropriate state-changing tool.
    Make at most one tool call in a single assistant turn. If you call a tool, emit the tool call only and no assistant text.
    If required information or confirmation is missing, ask the customer for it instead of guessing.
    After all required tool work is complete, briefly tell the customer what was completed or what cannot be completed.
    Do not write <think> tags or hidden reasoning in assistant messages.

profiles:
  no_gpu_walkthrough:
    description: Print the full command sequence without launching training.
    args:
      run_slug: retail-no-gpu-walkthrough
      dry_run: true
      no_weave: true
      no_wandb_compare: true
      skip_baseline_eval: true
      skip_sft: true
      skip_rl: true
      skip_compare: true

  smoke_tiny:
    description: Minimal local-GPU smoke run for setup validation on constrained hardware.
    args:
      base_model: Qwen/Qwen3-0.6B
      run_slug: qwen3-06b-retail-smoke
      data_dir: .art/curriculum_data/retail_bridge_state1_smoke
      source_dir: .art/full_data/retail
      data_artifact_name: retail-course-data-smoke
      build_bridge: true
      bridge_max_per_task: 1
      eval_limit: 4
      sft_max_steps: 8
      sft_chunk_size_batches: 4
      sft_peak_lr: 0.00001
      rl_algos: grpo
      rl_suffix: smoke-grpo-s1-g2-r2
      rl_train_limit: 4
      rl_steps: 1
      rl_groups_per_step: 2
      rl_rollouts_per_scenario: 2
      rl_max_sampling_rounds: 1
      rl_learning_rate: 0.000002
