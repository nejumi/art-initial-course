      build_bridge: true
      bridge_max_per_task: 2
      include_teacher_sft: true
      teacher_sft_limit: 256
      eval_limit: 8
      sft_max_steps: 48
      sft_chunk_size_batches: 8
      sft_peak_lr: 0.00001
      rl_algos: grpo
